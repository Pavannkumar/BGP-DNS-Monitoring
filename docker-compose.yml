

# ── Shared network ────────────────────────────────────────────────────────────
# All services communicate over this private internal network.
# Nothing is exposed to the internet — only mapped ports are accessible.
networks:
  bgp-dns-net:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────────────────────
# Data survives container restarts
volumes:
  postgres-data:
  grafana-data:

# ══════════════════════════════════════════════════════════════════════════════
services:

  # ── 1. ZOOKEEPER ─────────────────────────────────────────────────────────
  # Manages Kafka's internal coordination and leader election.
  # Must start before Kafka.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - bgp-dns-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. KAFKA BROKER ───────────────────────────────────────────────────────
  # The central message bus. Receives events from producers,
  # delivers them to Spark consumers.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - bgp-dns-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Auto-create our 4 topics with 3 partitions each
      KAFKA_CREATE_TOPICS: "bgp_raw_events:3:1,dns_raw_events:3:1,bgp_alerts:3:1,dns_alerts:3:1"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 3. SCHEMA REGISTRY ────────────────────────────────────────────────────
  # Enforces Avro schemas on all Kafka topics.
  # Rejects malformed messages at the point of ingest.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    networks:
      - bgp-dns-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  # ── 4. BGP PRODUCER ───────────────────────────────────────────────────────
  # Python script that simulates BGP route events and publishes
  # them to the bgp_raw_events Kafka topic.
  bgp-producer:
    build:
      context: ./producers
      dockerfile: Dockerfile
    container_name: bgp-producer
    networks:
      - bgp-dns-net
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPIC_NAME: bgp_raw_events
      EVENTS_PER_SECOND: 100
    command: python bgp_producer.py

  # ── 5. DNS PRODUCER ───────────────────────────────────────────────────────
  # Python script that simulates DNS query events and publishes
  # them to the dns_raw_events Kafka topic.
  dns-producer:
    build:
      context: ./producers
      dockerfile: Dockerfile
    container_name: dns-producer
    networks:
      - bgp-dns-net
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPIC_NAME: dns_raw_events
      EVENTS_PER_SECOND: 100
    command: python dns_producer.py

  # ── 6. APACHE SPARK ───────────────────────────────────────────────────────
  # Structured Streaming engine. Consumes from Kafka,
  # runs anomaly detection, writes results to PostgreSQL.
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark
    networks:
      - bgp-dns-net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_DB: bgp_dns_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    command: bash /app/entrypoint.sh

  # ── 7. POSTGRESQL ─────────────────────────────────────────────────────────
  # Persistent sink for all processed data.
  # init.sql creates the 5 tables automatically on first start.
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks:
      - bgp-dns-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bgp_dns_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bgp_dns_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 8. GRAFANA ────────────────────────────────────────────────────────────
  # Visualisation layer. Connects to PostgreSQL and renders
  # live BGP/DNS monitoring dashboards.
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    networks:
      - bgp-dns-net
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
